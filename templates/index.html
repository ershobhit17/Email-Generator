<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Internship Pitch Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1.3">
</head>
<body>
    <div class="dashboard-container">
        <!-- Input Form Section -->
        <div class="panel form-panel">
            <div class="logo">🤖 AI COLD-EMAILER</div>
            <p class="subtitle">Bypass generic AI filters with highly humanized custom outreach pitches.</p>
            
            <div class="input-field">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="e.g., Shobhit Rao" autocomplete="off">
            </div>

            <div class="input-field">
                <label>Your Key Tech Stack / Skills</label>
                <input type="text" id="skills" placeholder="e.g., Java, DSA, Flask, MySQL" autocomplete="off">
            </div>

            <div class="row">
                <div class="input-field">
                    <label>Target Company</label>
                    <input type="text" id="company" placeholder="e.g., Swiggy, TCS">
                </div>
                <div class="input-field">
                    <label>Target Role</label>
                    <input type="text" id="role" placeholder="e.g., Software Engineer Intern">
                </div>
            </div>

            <div class="input-field">
                <label>Best Capstone Project Name</label>
                <input type="text" id="project" placeholder="e.g., E-Commerce Load Balancer">
            </div>

            <button id="submit-btn" onclick="generatePitches()">GENERATE AI PITCHES</button>
        </div>

        <!-- Output Display Section -->
        <div class="panel output-panel">
            <!-- Tabs Header System -->
            <div class="tabs-header">
                <button class="tab-btn active" onclick="switchTab('professional')">💼 Professional</button>
                <button class="tab-btn" onclick="switchTab('builder')">🔥 Hungry Builder</button>
                <button class="tab-btn" onclick="switchTab('honest')">🌱 Honest Intern</button>
            </div>

            <!-- Email Sheet Display Area -->
            <div class="email-container">
                <div class="email-meta">
                    <p><b>Subject:</b> <span id="display-subject">Fill form to generate pitch...</span></p>
                </div>
                <div class="email-body" id="display-body">
                    Your customized humanized email pitch framework will dynamically load here.
                </div>
            </div>

            <!-- Utility Action Control Bar -->
            <div class="control-bar">
                <button id="copy-btn" class="action-btn copy" onclick="copyToClipboard()" disabled>Copy Content 📋</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}?v=1.3"></script>
</body>
</html>
